<style>

  *{box-sizing:border-box;}

  body{margin:0;background:var(--offwhite);color:var(--black);
    font-family:"Inter",-apple-system,Segoe UI,Arial,sans-serif;
    padding:80px 32px 120px;}
  .sheet{max-width:920px;margin:0 auto;}
  .brand{font-size:13px;letter-spacing:3px;text-transform:uppercase;

  .concept{padding:54px 0;border-top:1px solid var(--greige);}
  .concept:first-of-type{border-top:none;}
  .label{font-size:13px;letter-spacing:2px;text-transform:uppercase;
    color:var(--muted);font-weight:600;margin-bottom:30px;}
  .label .n{color:var(--bronze);margin-right:10px;}
  .row{display:flex;align-items:center;gap:52px;flex-wrap:wrap;}
  .gridcell{flex:0 0 auto;}
  .gridcell svg{width:148px;height:148px;display:block;}
  .lockup{flex:1 1 340px;min-width:300px;}
  .lockup svg{width:100%;max-width:460px;height:auto;display:block;}
  @media(max-width:640px){
