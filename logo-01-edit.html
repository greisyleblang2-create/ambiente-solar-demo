<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leblang Automatisierung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--offwhite:#F7F5F2;--black:#1A1A1A;--bronze:#A67C52;}
  *{box-sizing:border-box;}
  html,body{height:100%;}
  html{-webkit-font-smoothing:antialiased;}
  body{margin:0;background:var(--offwhite);color:var(--black);
    font-family:"Inter",-apple-system,Segoe UI,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:48px;}
  .logo{display:inline-block;text-align:left;}
  .mark{display:inline-block;}
  .leblang{margin:0;font-size:44px;font-weight:600;letter-spacing:-0.5px;line-height:1.04;color:var(--bronze);}
  .autom{margin:0;font-size:44px;font-weight:600;letter-spacing:-0.5px;line-height:1.04;color:var(--black);}
  .rule{width:100%;height:3px;border-radius:1.5px;background:var(--bronze);margin:16px 0;}
  .claim{margin:0;font-size:22px;font-weight:400;color:var(--black);opacity:0.65;}
  @media(max-width:520px){.leblang,.autom{font-size:32px;}.claim{font-size:19px;}}
</style>
</head>
<body>
  <div class="logo">
    <div class="mark">
      <p class="leblang">Leblang</p>
      <p class="autom">Automatisierung</p>
      <div class="rule"></div>
    </div>
    <p class="claim">Prozesse automatisieren. Zeit gewinnen.</p>
  </div>
</body>
</html>
