<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leblang Automatisierung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--offwhite:#F7F5F2;--black:#1A1A1A;--bronze:#A67C52;}
  *{box-sizing:border-box;}
  html,body{height:100%;}
  html{-webkit-font-smoothing:antialiased;}
  body{margin:0;background:var(--offwhite);color:var(--black);
    font-family:"Inter",-apple-system,Segoe UI,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:48px;}
  .logo{display:inline-block;text-align:left;}
  .row{display:flex;align-items:center;gap:16px;}
  .icon{flex:none;width:78px;height:78px;transform:translateY(-8px);}
  .icon svg{display:block;width:100%;height:100%;}
  .mark{display:inline-block;}
  .leblang{margin:0;font-size:44px;font-weight:600;letter-spacing:-0.5px;line-height:1.04;color:var(--bronze);}
  .autom{margin:0;font-size:44px;font-weight:600;letter-spacing:-0.5px;line-height:1.04;color:var(--black);}
  .rule{width:100%;height:3px;border-radius:1.5px;background:var(--bronze);margin:14px 0 0 0;}
  .claim{margin:14px 0 0 94px;font-size:18px;font-weight:400;color:var(--black);opacity:0.65;}
  @media(max-width:560px){
    .row{gap:12px;}
    .icon{width:58px;height:58px;transform:translateY(-6px);}
    .leblang,.autom{font-size:32px;}
    .claim{margin-left:70px;font-size:16px;}
  }
</style>
</head>
<body>
  <div class="logo">
    <div class="row">
      <div class="icon">
        <svg viewBox="0 0 100 100" aria-label="Leblang Automatisierung Icon">
          <g stroke="#1A1A1A" stroke-width="6" stroke-linecap="round">
            <line x1="42" y1="50" x2="15" y2="50"/>
            <line x1="42" y1="50" x2="83" y2="22"/>
            <line x1="42" y1="50" x2="80" y2="80"/>
          </g>
          <g fill="#F7F5F2" stroke="#1A1A1A" stroke-width="6">
            <circle cx="15" cy="50" r="8.5"/>
            <circle cx="83" cy="22" r="8.5"/>
            <circle cx="80" cy="80" r="8.5"/>
          </g>
          <circle cx="42" cy="50" r="12.5" fill="#A67C52"/>
        </svg>
      </div>
      <div class="mark">
        <p class="leblang">Leblang</p>
        <p class="autom">Automatisierung</p>
        <div class="rule"></div>
      </div>
    </div>
    <p class="claim">Prozesse automatisieren. Zeit gewinnen.</p>
  </div>
</body>
</html>
