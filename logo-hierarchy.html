<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leblang Automatisierung — Hierarchie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--offwhite:#F7F5F2;--greige:#D9D3C7;--black:#1A1A1A;--bronze:#A67C52;--muted:#8a857d;}
  *{box-sizing:border-box;}
  html{-webkit-font-smoothing:antialiased;}
  body{margin:0;background:var(--offwhite);color:var(--black);
    font-family:"Inter",-apple-system,Segoe UI,Arial,sans-serif;padding:90px 32px 130px;}
  .sheet{max-width:760px;margin:0 auto;}
  .v{padding:60px 0;border-top:1px solid var(--greige);}
  .v:first-of-type{border-top:none;}
  .n{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:34px;}
  svg.logo{width:100%;height:auto;display:block;}
  .c1{max-width:420px;}
  .c2{max-width:430px;}
  .c3{max-width:430px;margin:0 auto;}
  @media(max-width:600px){body{padding:56px 22px 90px;}}
</style>
</head>
<body>
<div class="sheet">

  <section class="v">
    <div class="n">01</div>
    <svg class="logo c1" viewBox="0 0 380 128">
      <g transform="translate(6,38)">
        <circle cx="20" cy="24" r="17" fill="#F7F5F2" stroke="#1A1A1A" stroke-width="3"/>
        <circle cx="20" cy="7" r="5" fill="#A67C52"/>
        <circle cx="5" cy="33" r="4" fill="#1A1A1A"/>
        <circle cx="35" cy="33" r="4" fill="#1A1A1A"/>
      </g>
      <text x="66" y="42" font-family="Inter" font-weight="600" font-size="12" letter-spacing="3" fill="#A67C52">LEBLANG</text>
      <text x="64" y="74" font-family="Inter" font-weight="600" font-size="34" letter-spacing="-0.5" fill="#1A1A1A">Automatisierung</text>
      <rect x="66" y="86" width="286" height="2.5" rx="1.25" fill="#A67C52"/>
      <text x="66" y="108" font-family="Inter" font-weight="400" font-size="12.5" fill="#1A1A1A" fill-opacity="0.6">Prozesse automatisieren. Zeit gewinnen.</text>
    </svg>
  </section>

  <section class="v">
    <div class="n">02</div>
    <svg class="logo c2" viewBox="0 0 390 128">
      <g transform="translate(6,36)">
        <circle cx="20" cy="24" r="17" fill="#F7F5F2" stroke="#1A1A1A" stroke-width="3"/>
        <circle cx="20" cy="7" r="5" fill="#A67C52"/>
        <circle cx="5" cy="33" r="4" fill="#1A1A1A"/>
        <circle cx="35" cy="33" r="4" fill="#1A1A1A"/>
      </g>
      <text x="66" y="44" font-family="Inter" font-weight="500" font-size="19" letter-spacing="-0.3" fill="#1A1A1A" fill-opacity="0.7">Leblang</text>
      <text x="66" y="74" font-family="Inter" font-weight="600" font-size="23" letter-spacing="4" fill="#1A1A1A">AUTOMATISIERUNG</text>
      <rect x="66" y="84" width="278" height="2.5" rx="1.25" fill="#A67C52"/>
      <text x="66" y="106" font-family="Inter" font-weight="400" font-size="12.5" fill="#1A1A1A" fill-opacity="0.6">Prozesse automatisieren. Zeit gewinnen.</text>
    </svg>
  </section>

  <section class="v">
    <div class="n">03</div>
    <svg class="logo c3" viewBox="0 0 400 184">
      <g>
        <circle cx="200" cy="34" r="17" fill="#F7F5F2" stroke="#1A1A1A" stroke-width="3"/>
        <circle cx="200" cy="17" r="5" fill="#A67C52"/>
        <circle cx="185" cy="43" r="4" fill="#1A1A1A"/>
        <circle cx="215" cy="43" r="4" fill="#1A1A1A"/>
      </g>
      <text x="200" y="82" text-anchor="middle" font-family="Inter" font-weight="600" font-size="12" letter-spacing="5" fill="#A67C52">LEBLANG</text>
      <text x="200" y="116" text-anchor="middle" font-family="Inter" font-weight="600" font-size="26" letter-spacing="3" fill="#1A1A1A">AUTOMATISIERUNG</text>
      <rect x="100" y="128" width="200" height="2.5" rx="1.25" fill="#A67C52"/>
      <text x="200" y="152" text-anchor="middle" font-family="Inter" font-weight="400" font-size="12.5" fill="#1A1A1A" fill-opacity="0.6">Prozesse automatisieren. Zeit gewinnen.</text>
    </svg>
  </section>

</div>
</body>
</html>
