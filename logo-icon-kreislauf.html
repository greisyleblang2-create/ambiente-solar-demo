<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leblang Automatisierung — Prozess-Kreislauf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--offwhite:#F7F5F2;--black:#1A1A1A;--bronze:#A67C52;--muted:#a99f8d;}
  *{box-sizing:border-box;}
  html{-webkit-font-smoothing:antialiased;}
  body{margin:0;background:var(--offwhite);color:var(--black);
    font-family:"Inter",-apple-system,Segoe UI,Arial,sans-serif;padding:90px 40px 130px;}
  .sheet{max-width:680px;margin:0 auto;}
  .v{padding:56px 0;border-top:1px solid #e4ded3;}
  .v:first-of-type{border-top:none;}
  .num{font-size:12px;letter-spacing:2.5px;color:var(--muted);font-weight:600;margin-bottom:30px;}
  .logo{display:inline-block;text-align:left;}
  .row{display:flex;align-items:center;gap:16px;}
  .icon{flex:none;width:78px;height:78px;transform:translateY(-8px);}
  .icon svg{display:block;width:100%;height:100%;}
  .mark{display:inline-block;}
  .leblang{margin:0;font-size:44px;font-weight:600;letter-spacing:-0.5px;line-height:1.04;color:var(--bronze);}
  .autom{margin:0;font-size:44px;font-weight:600;letter-spacing:-0.5px;line-height:1.04;color:var(--black);}
  .rule{width:100%;height:3px;border-radius:1.5px;background:var(--bronze);margin:14px 0 0 0;}
  .claim{margin:14px 0 0 94px;font-size:18px;font-weight:400;color:var(--black);opacity:0.65;}
  @media(max-width:560px){
    body{padding:54px 22px 90px;}
    .row{gap:12px;}
    .icon{width:58px;height:58px;transform:translateY(-6px);}
    .leblang,.autom{font-size:32px;}
    .claim{margin-left:70px;font-size:16px;}
  }
</style>
</head>
<body>
<div class="sheet">

  <section class="v">
    <div class="num">01 · OFFENER KREISLAUF</div>
    <div class="logo">
      <div class="row">
        <div class="icon">
          <svg viewBox="0 0 100 100" aria-label="Icon 01">
            <path d="M35 24 A30 30 0 1 0 78.2 39.7" fill="none" stroke="#1A1A1A" stroke-width="10" stroke-linecap="round"/>
            <path d="M78.2 39.7 A30 30 0 0 0 60.3 21.8" fill="none" stroke="#A67C52" stroke-width="10" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="mark">
          <p class="leblang">Leblang</p>
          <p class="autom">Automatisierung</p>
          <div class="rule"></div>
        </div>
      </div>
      <p class="claim">Prozesse automatisieren. Zeit gewinnen.</p>
    </div>
  </section>

  <section class="v">
    <div class="num">02 · PRÄZISIONS-DIAL</div>
    <div class="logo">
      <div class="row">
        <div class="icon">
          <svg viewBox="0 0 100 100" aria-label="Icon 02">
            <circle cx="50" cy="50" r="30" fill="none" stroke="#1A1A1A" stroke-width="8"/>
            <g stroke="#1A1A1A" stroke-width="5" stroke-linecap="round">
              <line x1="83" y1="50" x2="76" y2="50"/>
              <line x1="50" y1="83" x2="50" y2="76"/>
              <line x1="17" y1="50" x2="24" y2="50"/>
            </g>
            <line x1="50" y1="16" x2="50" y2="31" stroke="#A67C52" stroke-width="6.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="mark">
          <p class="leblang">Leblang</p>
          <p class="autom">Automatisierung</p>
          <div class="rule"></div>
        </div>
      </div>
      <p class="claim">Prozesse automatisieren. Zeit gewinnen.</p>
    </div>
  </section>

  <section class="v">
    <div class="num">03 · ZWEI BÖGEN</div>
    <div class="logo">
      <div class="row">
        <div class="icon">
          <svg viewBox="0 0 100 100" aria-label="Icon 03">
            <path d="M21.8 39.7 A30 30 0 0 1 78.2 39.7" fill="none" stroke="#1A1A1A" stroke-width="10" stroke-linecap="round"/>
            <path d="M21.8 60.3 A30 30 0 0 0 78.2 60.3" fill="none" stroke="#A67C52" stroke-width="10" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="mark">
          <p class="leblang">Leblang</p>
          <p class="autom">Automatisierung</p>
          <div class="rule"></div>
        </div>
      </div>
      <p class="claim">Prozesse automatisieren. Zeit gewinnen.</p>
    </div>
  </section>

</div>
</body>
</html>
