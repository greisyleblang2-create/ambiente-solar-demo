<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leblang Automatisierung — Handwerk + Automatisierung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--offwhite:#F7F5F2;--black:#1A1A1A;--bronze:#A67C52;--muted:#a99f8d;}
  *{box-sizing:border-box;}
  html{-webkit-font-smoothing:antialiased;}
  body{margin:0;background:var(--offwhite);color:var(--black);
    font-family:"Inter",-apple-system,Segoe UI,Arial,sans-serif;padding:90px 40px 130px;}
  .sheet{max-width:680px;margin:0 auto;}
  .v{padding:56px 0;border-top:1px solid #e4ded3;}
  .v:first-of-type{border-top:none;}
  .num{font-size:12px;letter-spacing:2.5px;color:var(--muted);font-weight:600;margin-bottom:30px;}
  .logo{display:inline-block;text-align:left;}
  .row{display:flex;align-items:center;gap:16px;}
  .icon{flex:none;width:80px;height:80px;transform:translateY(-8px);}
  .icon svg{display:block;width:100%;height:100%;}
  .mark{display:inline-block;}
  .leblang{margin:0;font-size:44px;font-weight:600;letter-spacing:-0.5px;line-height:1.04;color:var(--bronze);}
  .autom{margin:0;font-size:44px;font-weight:600;letter-spacing:-0.5px;line-height:1.04;color:var(--black);}
  .rule{width:100%;height:3px;border-radius:1.5px;background:var(--bronze);margin:14px 0 0 0;}
  .claim{margin:14px 0 0 96px;font-size:18px;font-weight:400;color:var(--black);opacity:0.65;}
  @media(max-width:560px){
    body{padding:54px 22px 90px;}
    .row{gap:12px;}
    .icon{width:60px;height:60px;transform:translateY(-6px);}
    .leblang,.autom{font-size:32px;}
    .claim{margin-left:72px;font-size:16px;}
  }
</style>
</head>
<body>
<div class="sheet">

  <section class="v">
    <div class="num">01 · DOKUMENT + ZAHNRAD</div>
    <div class="logo">
      <div class="row">
        <div class="icon">
          <svg viewBox="0 0 100 100" aria-label="Icon 01">
            <rect x="20" y="22" width="40" height="58" rx="4" fill="#F7F5F2" stroke="#1A1A1A" stroke-width="4"/>
            <line x1="28" y1="37" x2="50" y2="37" stroke="#A67C52" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="28" y1="48" x2="52" y2="48" stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
            <line x1="28" y1="59" x2="44" y2="59" stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
            <circle cx="63" cy="25" r="13" fill="#F7F5F2"/>
            <g fill="#A67C52">
              <rect x="61" y="8" width="4" height="6" rx="1.5" transform="rotate(0 63 25)"/>
              <rect x="61" y="8" width="4" height="6" rx="1.5" transform="rotate(45 63 25)"/>
              <rect x="61" y="8" width="4" height="6" rx="1.5" transform="rotate(90 63 25)"/>
              <rect x="61" y="8" width="4" height="6" rx="1.5" transform="rotate(135 63 25)"/>
              <rect x="61" y="8" width="4" height="6" rx="1.5" transform="rotate(180 63 25)"/>
              <rect x="61" y="8" width="4" height="6" rx="1.5" transform="rotate(225 63 25)"/>
              <rect x="61" y="8" width="4" height="6" rx="1.5" transform="rotate(270 63 25)"/>
              <rect x="61" y="8" width="4" height="6" rx="1.5" transform="rotate(315 63 25)"/>
            </g>
            <circle cx="63" cy="25" r="9.5" fill="#F7F5F2" stroke="#A67C52" stroke-width="3.5"/>
            <circle cx="63" cy="25" r="3" fill="#A67C52"/>
          </svg>
        </div>
        <div class="mark">
          <p class="leblang">Leblang</p>
          <p class="autom">Automatisierung</p>
          <div class="rule"></div>
        </div>
      </div>
      <p class="claim">Prozesse automatisieren. Zeit gewinnen.</p>
    </div>
  </section>

  <section class="v">
    <div class="num">02 · ZAHNRAD + WERKZEUG</div>
    <div class="logo">
      <div class="row">
        <div class="icon">
          <svg viewBox="0 0 100 100" aria-label="Icon 02">
            <g fill="#1A1A1A">
              <rect x="37" y="37" width="5" height="8" rx="2" transform="rotate(0 39.5 60)"/>
              <rect x="37" y="37" width="5" height="8" rx="2" transform="rotate(45 39.5 60)"/>
              <rect x="37" y="37" width="5" height="8" rx="2" transform="rotate(90 39.5 60)"/>
              <rect x="37" y="37" width="5" height="8" rx="2" transform="rotate(135 39.5 60)"/>
              <rect x="37" y="37" width="5" height="8" rx="2" transform="rotate(180 39.5 60)"/>
              <rect x="37" y="37" width="5" height="8" rx="2" transform="rotate(225 39.5 60)"/>
              <rect x="37" y="37" width="5" height="8" rx="2" transform="rotate(270 39.5 60)"/>
              <rect x="37" y="37" width="5" height="8" rx="2" transform="rotate(315 39.5 60)"/>
            </g>
            <circle cx="39.5" cy="60" r="15" fill="#F7F5F2" stroke="#1A1A1A" stroke-width="4"/>
            <circle cx="39.5" cy="60" r="6" fill="#F7F5F2" stroke="#1A1A1A" stroke-width="3.5"/>
            <line x1="50" y1="50" x2="67" y2="33" stroke="#F7F5F2" stroke-width="12" stroke-linecap="round"/>
            <line x1="50" y1="50" x2="67" y2="33" stroke="#A67C52" stroke-width="7" stroke-linecap="round"/>
            <circle cx="72" cy="28" r="8.5" fill="#F7F5F2" stroke="#A67C52" stroke-width="6"/>
          </svg>
        </div>
        <div class="mark">
          <p class="leblang">Leblang</p>
          <p class="autom">Automatisierung</p>
          <div class="rule"></div>
        </div>
      </div>
      <p class="claim">Prozesse automatisieren. Zeit gewinnen.</p>
    </div>
  </section>

  <section class="v">
    <div class="num">03 · KOMBINATION</div>
    <div class="logo">
      <div class="row">
        <div class="icon">
          <svg viewBox="0 0 100 100" aria-label="Icon 03">
            <rect x="10" y="22" width="30" height="50" rx="4" fill="#F7F5F2" stroke="#1A1A1A" stroke-width="3.5"/>
            <line x1="16" y1="33" x2="34" y2="33" stroke="#A67C52" stroke-width="3" stroke-linecap="round"/>
            <line x1="16" y1="43" x2="34" y2="43" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
            <line x1="16" y1="53" x2="28" y2="53" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
            <g fill="#A67C52">
              <circle cx="46" cy="46" r="2.6"/>
              <circle cx="53" cy="49" r="2.6"/>
              <circle cx="60" cy="52" r="2.6"/>
            </g>
            <g fill="#1A1A1A">
              <rect x="71.5" y="38" width="5" height="7" rx="2" transform="rotate(0 74 56)"/>
              <rect x="71.5" y="38" width="5" height="7" rx="2" transform="rotate(45 74 56)"/>
              <rect x="71.5" y="38" width="5" height="7" rx="2" transform="rotate(90 74 56)"/>
              <rect x="71.5" y="38" width="5" height="7" rx="2" transform="rotate(135 74 56)"/>
              <rect x="71.5" y="38" width="5" height="7" rx="2" transform="rotate(180 74 56)"/>
              <rect x="71.5" y="38" width="5" height="7" rx="2" transform="rotate(225 74 56)"/>
              <rect x="71.5" y="38" width="5" height="7" rx="2" transform="rotate(270 74 56)"/>
              <rect x="71.5" y="38" width="5" height="7" rx="2" transform="rotate(315 74 56)"/>
            </g>
            <circle cx="74" cy="56" r="13" fill="#F7F5F2" stroke="#1A1A1A" stroke-width="3.5"/>
            <circle cx="74" cy="56" r="4" fill="#A67C52"/>
          </svg>
        </div>
        <div class="mark">
          <p class="leblang">Leblang</p>
          <p class="autom">Automatisierung</p>
          <div class="rule"></div>
        </div>
      </div>
      <p class="claim">Prozesse automatisieren. Zeit gewinnen.</p>
    </div>
  </section>

</div>
</body>
</html>
