<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leblang Automatisierung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--offwhite:#F7F5F2;--black:#1A1A1A;--bronze:#A67C52;}
  *{box-sizing:border-box;}
  html,body{height:100%;}
  html{-webkit-font-smoothing:antialiased;}
  body{margin:0;background:var(--offwhite);color:var(--black);
    font-family:"Inter",-apple-system,Segoe UI,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:48px;}
  .logo{display:inline-block;text-align:left;}
  .row{display:flex;align-items:center;gap:24px;}
  .icon{flex:none;width:84px;height:84px;}
  .icon svg{display:block;width:100%;height:100%;}
  .mark{display:inline-block;}
  .leblang{margin:0;font-size:44px;font-weight:600;letter-spacing:-0.5px;line-height:1.04;color:var(--bronze);}
  .autom{margin:0;font-size:44px;font-weight:600;letter-spacing:-0.5px;line-height:1.04;color:var(--black);}
  .rule{width:100%;height:3px;border-radius:1.5px;background:var(--bronze);margin:14px 0 0 0;}
  .claim{margin:14px 0 0 108px;font-size:18px;font-weight:400;color:var(--black);opacity:0.65;}
  @media(max-width:560px){
    .row{gap:18px;}
    .icon{width:62px;height:62px;}
    .leblang,.autom{font-size:32px;}
    .claim{margin-left:80px;font-size:16px;}
  }
</style>
</head>
<body>
  <div class="logo">
    <div class="row">
      <div class="icon">
        <svg viewBox="0 0 100 100" aria-label="Leblang Automatisierung Icon">
          <g stroke="#A67C52" stroke-width="5" stroke-linecap="round" opacity="0.42">
            <line x1="50" y1="50" x2="25" y2="25"/>
            <line x1="50" y1="50" x2="75" y2="25"/>
            <line x1="50" y1="50" x2="25" y2="75"/>
            <line x1="50" y1="50" x2="75" y2="75"/>
          </g>
          <g fill="#A67C52" opacity="0.72">
            <circle cx="25" cy="25" r="10"/>
            <circle cx="75" cy="25" r="10"/>
            <circle cx="25" cy="75" r="10"/>
            <circle cx="75" cy="75" r="10"/>
          </g>
          <circle cx="50" cy="50" r="15" fill="#A67C52"/>
        </svg>
      </div>
      <div class="mark">
        <p class="leblang">Leblang</p>
        <p class="autom">Automatisierung</p>
        <div class="rule"></div>
      </div>
    </div>
    <p class="claim">Prozesse automatisieren. Zeit gewinnen.</p>
  </div>
</body>
</html>
